name: fsm_frontend
description: Field Service Management Mobile Application
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  bloc: ^9.1.0
  hydrated_bloc: ^11.0.0
  equatable: ^2.0.5

  # Networking
  dio: ^5.9.0
  dio_cache_interceptor: ^4.0.6
  pretty_dio_logger: ^1.4.0
  awesome_dio_interceptor: ^1.2.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.7.1+4

  # Routing
  auto_route: ^11.1.0

  # Functional Programming
  dartz: ^0.10.1

  # Serialization
  json_annotation: ^4.9.0

  # Local Storage / Persistence
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # UI / Design
  sizer: ^3.0.4
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.3
  iconsax_flutter: ^1.0.0

  # Calendar & Date
  syncfusion_flutter_datepicker: ^29.1.33
  table_calendar: ^3.2.0
  timeago: ^3.7.0
  timezone: ^0.9.4

  # Camera & Image
  camerawesome: ^2.5.0
  flutter_image_compress: ^2.4.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Stream Utilities
  stream_transform: ^2.1.1

  # Sheets / Overlays
  sheet: ^1.0.0

  # Persistent Headers
  persistent_header_adaptive: ^2.1.2

  # UUID
  uuid: ^4.5.1

  # Collection utilities
  collection: ^1.19.0

  # Google APIs
  googleapis: ^13.2.0

  # Misc
  intl: ^0.20.0
  local_auth: ^2.3.0
  connectivity_plus: ^7.0.0
  cached_network_image: ^3.4.1
  jwt_decoder: ^2.0.1
  firebase_messaging: ^16.1.3
  firebase_core: ^4.6.0
  signature: ^6.3.0
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  geolocator: ^13.0.2
  google_maps_flutter: ^2.14.2
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  injectable_generator: ^2.12.1
  auto_route_generator: ^10.5.0
  flutter_gen_runner: ^5.13.0+1
  flutter_gen: ^5.13.0+1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/

  fonts:
    - family: MyFlutterApp
      fonts:
        - asset: assets/fonts/MyFlutterApp.ttf

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: false
  assets:
    enabled: true
    outputs:
      package_parameter_enabled: false
      style: dot-delimiter
  fonts:
    enabled: true
